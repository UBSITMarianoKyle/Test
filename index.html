<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>A Little Question For You</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Lora:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet" />

<!-- EmailJS SDK -->
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --brown: #e0637f;
    --brown-dark: #9c2f4e;
    --brown-light: #f6c6d3;
    --cream: #fff5f7;
    --muted: #c37f92;
  }

  html, body {
    width: 100%; min-height: 100%;
    font-family: 'Lora', Georgia, serif;
    background: var(--cream);
  }

  .card {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2.5rem 1.5rem;
  }

  /* ---- Photo ---- */
  .photo {
    width: 140px;
    height: 140px;
    border-radius: 50%;
    object-fit: cover;
    border: 4px solid #fff;
    box-shadow: 0 6px 20px rgba(156,47,78,0.18);
    margin-bottom: 1.5rem;
  }
  /* If you don't add a photo, this placeholder circle shows instead */
  .photo-placeholder {
    width: 140px;
    height: 140px;
    border-radius: 50%;
    background: var(--brown-light);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 2.6rem;
    margin-bottom: 1.5rem;
    border: 4px solid #fff;
    box-shadow: 0 6px 20px rgba(156,47,78,0.18);
  }

  h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(1.8rem, 6vw, 2.6rem);
    font-weight: 900;
    color: var(--brown-dark);
    text-align: center;
    line-height: 1.25;
    margin-bottom: 0.5rem;
    max-width: 420px;
  }

  h2.form-title {
    font-family: 'Playfair Display', serif;
    font-size: clamp(1.4rem, 5vw, 1.9rem);
    font-weight: 900;
    color: var(--brown-dark);
    text-align: center;
    margin-bottom: 0.4rem;
  }

  .subtitle {
    font-size: 0.95rem;
    color: var(--muted);
    margin-bottom: 2rem;
    text-align: center;
    max-width: 340px;
  }

  .btn-area {
    display: flex;
    gap: 1rem;
    align-items: center;
    flex-wrap: wrap;
    justify-content: center;
  }

  #yes-btn, #submit-btn {
    background: var(--brown-dark);
    color: #fff;
    border: none;
    border-radius: 40px;
    padding: 14px 34px;
    font-family: 'Lora', serif;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    transition: transform 0.15s, background 0.15s;
  }
  #yes-btn:hover, #submit-btn:hover:not(:disabled) {
    background: var(--brown);
    transform: translateY(-2px);
  }
  #yes-btn:disabled, #submit-btn:disabled { opacity: 0.6; cursor: wait; transform: none; }

  #no-btn {
    position: fixed;
    background: transparent;
    color: var(--muted);
    border: 1.5px solid var(--brown-light);
    border-radius: 40px;
    padding: 12px 26px;
    font-family: 'Lora', serif;
    font-size: 0.9rem;
    cursor: pointer;
    transition: border-color 0.15s;
    white-space: nowrap;
    z-index: 100;
  }
  #no-btn:hover { border-color: var(--brown); }

  .hint {
    margin-top: 1.4rem;
    font-size: 0.8rem;
    font-style: italic;
    color: var(--muted);
    opacity: 0.85;
    text-align: center;
    min-height: 1.2em;
  }

  /* ---- Scheduling form ---- */
  #schedule-form {
    display: none;
    flex-direction: column;
    align-items: center;
    width: 100%;
    max-width: 340px;
  }
  #schedule-form.show { display: flex; }

  .field {
    width: 100%;
    margin-bottom: 1rem;
    text-align: left;
  }
  .field label {
    display: block;
    font-size: 0.85rem;
    color: var(--muted);
    margin-bottom: 0.3rem;
  }
  .field input, .field select, .field textarea {
    width: 100%;
    padding: 11px 13px;
    border: 1.5px solid var(--brown-light);
    border-radius: 10px;
    background: #fff;
    font-family: 'Lora', serif;
    font-size: 0.95rem;
    color: var(--brown-dark);
    outline: none;
  }
  .field input:focus, .field select:focus, .field textarea:focus {
    border-color: var(--brown);
  }
  .field textarea { resize: vertical; min-height: 60px; }

  /* ---- Result panels ---- */
  #success, #declined {
    display: none;
    position: fixed; inset: 0;
    background: var(--cream);
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 0.8rem;
    padding: 2rem;
    text-align: center;
  }
  #success.show, #declined.show { display: flex; }
  #success .icon, #declined .icon { font-size: 3rem; margin-bottom: 0.4rem; }
  #success h2, #declined h2 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(1.6rem, 5vw, 2.2rem);
    font-weight: 900;
    color: var(--brown-dark);
  }
  #success p, #declined p {
    color: var(--muted);
    font-size: 1rem;
    max-width: 320px;
  }
</style>
</head>
<body>

<div class="card" id="main-card">

  <!-- Step 1: the invitation -->
  <div id="step-ask" style="display:flex; flex-direction:column; align-items:center;">

    <!-- ============================================================
         PUT YOUR PHOTO HERE:
         Replace the div.photo-placeholder below with:
         <img class="photo" src="your-photo.jpg" alt="">
         (keep the photo file in the same folder as this html file)
    ============================================================ -->
   <img class="photo" src="/images/pic2.png" alt="">

    <h1>Tangina niyo kape ra ra ra
    
    </h1>
    <p class="subtitle">There's a cafe I've been wanting to try with you.</p>
    <div class="btn-area">
      <button id="yes-btn" onclick="goToSchedule()">Yes</button>
      <button id="no-btn" onclick="respond('no')">Maybe not</button>
    </div>
    <p class="hint" id="hint">The coffee's on me… just say yes.</p>
  </div>

  <!-- Step 2: pick date, time, and preference -->
  <form id="schedule-form" onsubmit="return submitSchedule(event)">
    <h2 class="form-title">Ayun paldo</h2>
    <p class="subtitle">Pick what's easiest for you, wag lang sabado inuman namin yon</p>

    <div class="field">
      <label for="date">Preferred date</label>
      <input type="date" id="date" name="date" required />
    </div>

    <div class="field">
      <label for="time">Preferred time</label>
      <input type="time" id="time" name="time" required />
    </div>

    <div class="field">
  <label for="drink">What are you in the mood for?</label>
    <select id="drink" name="drink" required>
    <option value="" disabled selected>Choose one…</option>
    <option value="Coffee">Coffee</option>
      <option value="Tea">Tea</option>
  <option value="Milk tea / boba">Milk tea </option>
    <option value="Pastries + coffee">Pastries + coffee</option>
    <option value="Surprise me">Shabu</option>
       <option value="Surprise me">Surprise me</option>
      </select>
    </div> <div class="field">
    <label for="note">Anything else? (optional)</label>
  <textarea id="note" name="note" placeholder=""></textarea>
    </div><button type="submit" id="submit-btn">Send it </button>
  </form></div>
<div id="success">
  <div class="icon">☕</div>
  <h2>Thanks</h2>
  <p>See you soon</p></div>
<div id="declined">
  <div class="icon">💔</div>
  <h2>Oh well…</h2>
  <p>Thanks for being honest with me. No hard feelings.</p></div><script>
const EMAILJS_PUBLIC_KEY  = "MDHWyfCOiZRmR0q4K";
  const EMAILJS_SERVICE_ID  = "service_ibkfgfq";
  const EMAILJS_TEMPLATE_ID = "template_79a2drh";
  if (window.emailjs && EMAILJS_PUBLIC_KEY !== "YOUR_PUBLIC_KEY") {
    emailjs.init({ publicKey: EMAILJS_PUBLIC_KEY });
}
  const noBtn = document.getElementById('no-btn');
  const yesBtn = document.getElementById('yes-btn');
  const hint = document.getElementById('hint');
  const hints = [
    "The coffee's on me just say yes.", "Damot edi wag, jk lng sige na.", "Sure ka na namo?", "last na eto naman", "Sige na.",
  ];
  let noCount = 0;
  noBtn.style.left = '62%';
  noBtn.style.top = '70%';

  function runAway() {
    const margin = 20;
    const bw = noBtn.offsetWidth || 120;
    const bh = noBtn.offsetHeight || 46;
    let nx, ny, tries = 0;
    do {
      nx = margin + Math.random() * (window.innerWidth - bw - margin * 2);
      ny = margin + Math.random() * (window.innerHeight - bh - margin * 2);
      tries++;
    } while (tries < 25 && isTooCloseToYes(nx, ny, bw, bh));
    noBtn.style.left = nx + 'px';
    noBtn.style.top = ny + 'px';
    noCount++;
    hint.textContent = hints[Math.min(noCount, hints.length - 1)];
  }
  function isTooCloseToYes(nx, ny, bw, bh) {
    const yr = yesBtn.getBoundingClientRect();
    const cx = nx + bw / 2, cy = ny + bh / 2;
    const ycx = yr.left + yr.width / 2, ycy = yr.top + yr.height / 2;
    return Math.abs(cx - ycx) < 180 && Math.abs(cy - ycy) < 80;
  }
  const MAX_DODGES = 4;
  noBtn.addEventListener('mouseenter', () => { if (noCount < MAX_DODGES) runAway(); });
  noBtn.addEventListener('touchstart', e => {
    if (noCount < MAX_DODGES) { e.preventDefault(); runAway(); }
  }, { passive: false });
  function goToSchedule() {
    document.getElementById('step-ask').style.display = 'none';
    document.getElementById('schedule-form').classList.add('show');
  }

  function respond(answer) {
    noBtn.disabled = true;
    document.getElementById('declined').classList.add('show');
    sendEmail({ answer: 'No' });
  }

  function submitSchedule(e) {
    e.preventDefault();
    const submitBtn = document.getElementById('submit-btn');
    submitBtn.disabled = true;
    submitBtn.textContent = "Sending…";

    const data = {
      answer: 'YES 🎉',
      date: document.getElementById('date').value,
      time: document.getElementById('time').value,
      drink: document.getElementById('drink').value,
      note: document.getElementById('note').value || '(none)',
    };

    sendEmail(data, () => {
      document.getElementById('success').classList.add('show');
    });

    return false;
  }

  function sendEmail(data, onDone) {
    const payload = {
      answer: data.answer,
      date: data.date || '',
      time: data.time || '',
      drink: data.drink || '',
      note: data.note || '',
      time_sent: new Date().toLocaleString()
    };

    if (!window.emailjs) {
      console.warn("EmailJS SDK didn't load.");
      if (onDone) onDone();
      return;
    }

    emailjs.send(EMAILJS_SERVICE_ID, EMAILJS_TEMPLATE_ID, payload)
      .then(() => { if (onDone) onDone(); })
      .catch(err => {
        console.error("EmailJS error:", err);
        alert("Hmm, something went wrong sending this. Please try again.");
        const submitBtn = document.getElementById('submit-btn');
        submitBtn.disabled = false;
        submitBtn.textContent = "Send it 💌";
      });
  }
</script>
</body>
</html>
